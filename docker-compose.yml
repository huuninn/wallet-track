# ============================================================================
# Wallet Track — Docker Compose para desenvolvimento local
# ----------------------------------------------------------------------------
# Stack: FrankenPHP + MariaDB 11.8 + Redis 7.x
#
# Uso:
#   docker compose up -d --build        # Sobe a aplicação
#   docker compose logs -f app          # Acompanha logs
#   docker compose exec app php artisan tinker
#   docker compose exec app composer require vendor/package
#   docker compose down                 # Para containers (preserva volumes)
#   docker compose down -v              # ⚠️  Limpa vendor/storage/node_modules/mariadb_data/redis_data (perde dados de dev!)
#
# Aplicação disponível em http://localhost:8000
# (Container escuta em :8080 para paridade com Cloud Run PORT=8080.)
#
# Para subir também o Vite dev server (HMR de assets frontend):
#   docker compose --profile frontend up
#   Frontend dev em http://localhost:5173
# ============================================================================

services:
  # Imagem base com extensões PHP compiladas (pdo_mysql, redis, etc.).
  # Build isolado: só reconstrói quando docker/Dockerfile.base mudar.
  base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: wallet-track-base:latest
    command: ["echo", "Base image ready"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        BASE_IMAGE: wallet-track-base:latest
    image: wallet-track:dev
    container_name: wallet-track
    restart: unless-stopped
    depends_on:
      base:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8080"   # host 8000 → container 8080 (paridade Cloud Run PORT=8080)
    volumes:
      # Código-fonte (host → container). Alterações refletem via revalidação
      # de opcache (configurado no estágio `dev` do Dockerfile).
      - ./:/app
      # vendor em volume nomeado: mantém platform Linux dentro do container
      # (host pode ter vendor/ de plataforma diferente) e evita shadow.
      - vendor:/app/vendor
      # Storage persistente (logs e cache file-based; sessions são in-memory array).
      - storage:/app/storage
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      PORT: "8080"    # paridade com Cloud Run (Caddyfile usa {$PORT:8080})
      # Override de DB/Redis para o contexto Docker: .env aponta 127.0.0.1
      # (para dev nativo), mas dentro do container os serviços são hostnames.
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-wallet_track}
      DB_USERNAME: ${DB_USERNAME:-wallet}
      DB_PASSWORD: ${DB_PASSWORD:-walletpass}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Mesmo padrão dos overrides de DB/Redis: força o path do container,
      # independente do .env do host.
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /app/wallet-track-499719-54b725c0bb5d.json
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 8080) ? 0 : 1);'"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  mariadb:
    image: mariadb:11.8
    container_name: wallet-track-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_DATABASE:-wallet_track}
      MARIADB_USER: ${DB_USERNAME:-wallet}
      MARIADB_PASSWORD: ${DB_PASSWORD:-walletpass}
    volumes:
      - mariadb_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wallet-track-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Vite dev server (HMR). Opt-in via profile para não pesar o start padrão.
  vite:
    image: node:22-alpine
    container_name: wallet-track-vite
    working_dir: /app
    profiles: ["frontend"]
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command:
      - sh
      - -c
      - "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"

volumes:
  vendor:
  storage:
  node_modules:
  mariadb_data:
  redis_data:
